<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ape Squad - Player Spotlight (Checkbox CSV)</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ape-cyan: #01a3eb; --ape-orange: #ff853b; --ape-pink: #f834ac; --ape-purple: #904ce2;
            --solid-bg: #0c0c0c; 
            --team-gradient: linear-gradient(135deg, var(--ape-cyan), var(--ape-purple));
            --font-main: 'Orbitron', sans-serif; --font-header: 'Bebas Neue', sans-serif; --font-sub: 'Roboto', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-main); background: rgba(0,0,0,0); color: #fff; overflow: hidden; width: 2560px; height: 1440px; }

        /* --- THE SPOTLIGHT CARD (ANCHORED RIGHT) --- */
        .spotlight-container {
            position: absolute; right: 60px; bottom: 105px; 
            width: 660px; 
            background: var(--solid-bg);
            border-right: 6px solid var(--ape-cyan); 
            border-radius: 8px 0 0 8px; 
            box-shadow: -15px 15px 40px rgba(0,0,0,0.9), 0 0 20px rgba(1, 163, 235, 0.2);
            display: flex; flex-direction: column;
            
            transform: translateX(150%);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease-in-out;
            z-index: 100;
        }
        .spotlight-container.active { transform: translateX(0); opacity: 1; }

        /* --- HEADER (NAME & TEAM & LOGO) --- */
        .sp-header {
            padding: 20px 30px; 
            background: linear-gradient(225deg, rgba(1, 163, 235, 0.15), transparent);
            border-bottom: 2px solid #222;
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }
        
        .sp-text-group { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        .sp-label {
            font-family: var(--font-sub); font-size: 1rem; color: var(--ape-cyan); 
            text-transform: uppercase; letter-spacing: 4px; font-weight: 900;
            display: flex; align-items: center; justify-content: space-between;
        }
        
        .sp-ign { color: #888; font-size: 0.85rem; letter-spacing: 2px; }

        /* --- NAME & RANK BADGE ROW --- */
        .sp-name-wrapper {
            display: flex; align-items: center; gap: 15px; margin-top: 4px;
        }

        .sp-name {
            font-family: var(--font-header); font-size: 4.5rem; letter-spacing: 2px; 
            text-transform: uppercase; line-height: 0.9; text-shadow: 3px 3px 5px rgba(0,0,0,0.8);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .sp-rank-box {
            font-family: var(--font-header); font-size: 2.2rem; color: #fff;
            background: linear-gradient(135deg, rgba(248, 52, 172, 0.2), rgba(144, 76, 226, 0.2));
            padding: 4px 12px; border-radius: 4px;
            border: 1px solid var(--ape-pink); box-shadow: 0 0 10px rgba(248, 52, 172, 0.4);
            text-align: center; line-height: 1; letter-spacing: 1px;
            display: none; white-space: nowrap; flex-shrink: 0; transform: translateY(-2px);
        }
        .sp-rank-box.active { display: block; }

        .sp-team {
            font-family: var(--font-sub); font-size: 1.2rem; color: var(--ape-orange);
            text-transform: uppercase; font-weight: 700; letter-spacing: 2px;
            margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- PLAYER META DATA (ROLE, NATION, EARNINGS) --- */
        .sp-meta-row {
            display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap;
        }
        .meta-badge {
            font-family: var(--font-sub); font-size: 0.85rem; font-weight: 900;
            letter-spacing: 1px; padding: 3px 10px; border-radius: 4px;
            background: #222; color: #ccc; text-transform: uppercase;
            /* Flex layout added here to perfectly align flags */
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .meta-role { border: 1px solid rgba(255,255,255,0.2); }
        .meta-earn { background: rgba(248, 52, 172, 0.15); color: var(--ape-pink); border: 1px solid var(--ape-pink); }
        .meta-nation { border: 1px solid var(--ape-cyan); color: var(--ape-cyan); background: rgba(1, 163, 235, 0.1); }

        /* DYNAMIC LOGO BOX */
        .sp-visual-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .sp-logo-box {
            width: 85px; height: 85px; background: var(--team-gradient);
            padding: 4px; flex-shrink: 0; box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .sp-logo-box img { width: 100%; height: 100%; object-fit: cover; background: #000; }

        /* --- HIGHLIGHTS LIST --- */
        .sp-body { padding: 15px 30px 25px 30px; display: flex; flex-direction: column; gap: 10px; }
        .sp-body-title {
            font-family: var(--font-sub); font-size: 0.9rem; color: #888; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-bottom: 2px;
        }

        .highlight-item {
            display: flex; align-items: center; gap: 15px;
            background: #151515; padding: 10px 15px; 
            border-left: 3px solid var(--ape-pink); border-radius: 0 4px 4px 0;
        }
        
        .hl-placement {
            font-family: var(--font-header); font-size: 2rem; color: #fff;
            width: 85px; text-align: center; line-height: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); flex-shrink: 0;
        }
        
        .hl-details { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .hl-tourney {
            font-family: var(--font-header); font-size: 1.6rem; color: #ccc;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1; letter-spacing: 1px;
        }
        .hl-meta {
            font-family: var(--font-sub); font-size: 0.85rem; color: var(--ape-pink);
            text-transform: uppercase; font-weight: 700; letter-spacing: 1px;
            margin-top: 2px;
        }

    </style>
</head>
<body>

    <div class="spotlight-container" id="spotlight-card">
        <div class="sp-header">
            <div class="sp-text-group">
                <div class="sp-label">
                    <span>PLAYER SPOTLIGHT</span>
                </div>
                
                <div class="sp-name-wrapper">
                    <div class="sp-name" id="sp-name">LOADING</div>
                    <div class="sp-rank-box" id="sp-rank">GLOBAL #1</div>
                </div>

                <div class="sp-team" id="sp-team">LOADING TEAM</div>
                
                <div class="sp-meta-row">
                    <span class="meta-badge meta-role" id="sp-role">ROLE</span>
                    <span class="meta-badge meta-nation" id="sp-nation-container">
                        <!-- Flag Image Added Here -->
                        <img id="sp-flag" src="" style="width: 18px; height: 13px; display: none; object-fit: cover; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2);">
                        <span id="sp-nation">NATION</span>
                    </span>
                    <span class="meta-badge meta-earn" id="sp-earn">$0 EARNED</span>
                </div>
                
                <div class="sp-ign" id="sp-ign" style="margin-top: 8px;">EMBARK ID</div>
            </div>
            
            <div class="sp-visual-group">
                <div class="sp-logo-box"><img src="" id="sp-team-logo" onerror="this.style.display='none'"></div>
            </div>
        </div>

        <div class="sp-body" id="sp-body-container">
            <div class="sp-body-title">CAREER HIGHLIGHTS</div>
            <div id="highlights-container">
                <!-- Highlights injected here -->
            </div>
        </div>
    </div>

    <script>
        // =======================================================
        // CONFIGURATION
        // =======================================================
        const SPREADSHEET_ID = '10ZmWteGljWdAu4TIMMkKkt23jFSuuKlTtqc-bxpVvN4';
        const CONTROL_SHEET_GID = '228881380'; 
        const ROSTER_SHEET_GID = '1769112582'; 

        let currentPlayerDisplayed = "";

        // Country code dictionary for flags
        const COUNTRY_MAP = {
            "usa": "us", "united states": "us", "us": "us", "america": "us",
            "canada": "ca", "ca": "ca",
            "uk": "gb", "united kingdom": "gb", "gb": "gb", "england": "gb", "great britain": "gb",
            "france": "fr", "fr": "fr",
            "germany": "de", "de": "de",
            "spain": "es", "es": "es",
            "italy": "it", "it": "it",
            "brazil": "br", "br": "br",
            "mexico": "mx", "mx": "mx",
            "australia": "au", "au": "au",
            "japan": "jp", "jp": "jp",
            "korea": "kr", "south korea": "kr", "kr": "kr",
            "sweden": "se", "se": "se",
            "denmark": "dk", "dk": "dk",
            "norway": "no", "no": "no",
            "finland": "fi", "fi": "fi",
            "poland": "pl", "pl": "pl",
            "netherlands": "nl", "nl": "nl",
            "belgium": "be", "be": "be",
            "switzerland": "ch", "ch": "ch",
            "austria": "at", "at": "at",
            "portugal": "pt", "pt": "pt",
            "argentina": "ar", "ar": "ar",
            "chile": "cl", "cl": "cl"
        };

        // --- RAW CSV PARSER (Bypasses Google API Type Bugs Entirely) ---
        function parseCSV(text) {
            let rows = []; let row = []; let inQuotes = false; let val = '';
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let next = text[i+1];
                if (c === '"' && inQuotes && next === '"') { val += '"'; i++; } 
                else if (c === '"') { inQuotes = !inQuotes; } 
                else if (c === ',' && !inQuotes) { row.push(val.trim()); val = ''; } 
                else if ((c === '\n' || c === '\r') && !inQuotes) {
                    if (c === '\r' && next === '\n') i++; 
                    row.push(val.trim()); rows.push(row); row = []; val = '';
                } else { val += c; }
            }
            if (val !== '' || row.length > 0) { row.push(val.trim()); rows.push(row); }
            return rows;
        }

        function formatTeamNameToPathSegment(name) {
            if (!name || name.trim() === '') return 'default'; 
            return name.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        }

        const TIER_WEIGHTS = {
            "S-TIER": 100, "A-TIER": 90, "B-TIER": 80, "C-TIER": 70,
            "D-TIER": 60, "SHOWMATCH": 50, "QUALIFIER": 40, "MISC": 30
        };

        function getTierScore(tierString) {
            const t = (tierString || "").toUpperCase();
            for (let key in TIER_WEIGHTS) {
                if (t.includes(key)) return TIER_WEIGHTS[key];
            }
            return 0; 
        }

        async function fetchHighlights() {
            try {
                const response = await fetch(`players.json?nocache=${new Date().getTime()}`);
                return await response.json();
            } catch (error) {
                console.error("JSON Error:", error);
                return[];
            }
        }

        async function fetchPlayerRank(embarkId) {
            if(!embarkId || embarkId === "UNKNOWN") return null;
            const encodedId = encodeURIComponent(embarkId);
            const API_URL = `https://api.the-finals-leaderboard.com/v1/leaderboard/s10/crossplay?name=${encodedId}`; 

            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const json = await response.json();
                    if (json.data && json.data.length > 0) return json.data[0].rank; 
                }
                return null;
            } catch(e) { return null; }
        }

        async function fetchRosterData(targetName) {
            try {
                // Using CSV here as well so rosters don't break
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${ROSTER_SHEET_GID}&nocache=${new Date().getTime()}`;
                const res = await fetch(url);
                const csvData = await res.text();
                const rows = parseCSV(csvData);

                const searchTarget = targetName.toLowerCase().trim();

                for(let i = 1; i < rows.length; i++) {
                    if(rows[i].length < 4) continue;
                    const teamName = (rows[i][3] || "").trim();
                    const capName = (rows[i][5] || "").trim();
                    const p2Name = (rows[i][7] || "").trim();
                    const p3Name = (rows[i][9] || "").trim();
                    const subName = (rows[i][11] || "").trim();

                    if(capName.toLowerCase() === searchTarget) return { team: teamName, embarkId: rows[i][6] }; 
                    if(p2Name.toLowerCase() === searchTarget) return { team: teamName, embarkId: rows[i][8] }; 
                    if(p3Name.toLowerCase() === searchTarget) return { team: teamName, embarkId: rows[i][10] }; 
                    if(subName.toLowerCase() === searchTarget) return { team: teamName, embarkId: rows[i][12] }; 
                }
            } catch(e) { console.error("Roster Fetch Error:", e); }
            return null;
        }

        function buildHighlightHTML(hl) {
            let metaText = hl.tier || "Tournament";
            return `
                <div class="highlight-item">
                    <div class="hl-placement">${hl.placement}</div>
                    <div class="hl-details">
                        <div class="hl-tourney">${hl.tournament}</div>
                        <div class="hl-meta">${metaText}</div>
                    </div>
                </div>
            `;
        }

        async function updateSpotlight(playerName) {
            const card = document.getElementById('spotlight-card');
            
            if (!playerName || playerName.trim() === "") {
                card.classList.remove('active');
                currentPlayerDisplayed = "";
                return;
            }

            if (playerName.toLowerCase() === currentPlayerDisplayed.toLowerCase()) return; 

            const rosterInfo = await fetchRosterData(playerName);
            const teamName = rosterInfo ? rosterInfo.team : "Free Agent";
            const embarkId = rosterInfo ? rosterInfo.embarkId : "UNKNOWN";

            const jsonDB = await fetchHighlights();
            const playerData = jsonDB.find(p => p.player && p.player.toLowerCase() === playerName.toLowerCase());
            
            document.getElementById('sp-name').textContent = playerName;
            document.getElementById('sp-ign').textContent = `EMBARK ID: ${embarkId}`;
            document.getElementById('sp-team').textContent = teamName;

            const roleEl = document.getElementById('sp-role');
            const natContainerEl = document.getElementById('sp-nation-container');
            const natTextEl = document.getElementById('sp-nation');
            const flagEl = document.getElementById('sp-flag');
            const earnEl = document.getElementById('sp-earn');

            if (playerData) {
                roleEl.textContent = playerData.role || "Unknown Role";
                
                if (playerData.nationality) {
                    natContainerEl.style.display = "inline-flex";
                    natTextEl.textContent = playerData.nationality;
                    
                    const rawNat = playerData.nationality.toLowerCase().trim();
                    const isoCode = COUNTRY_MAP[rawNat];
                    if (isoCode) {
                        flagEl.src = `https://flagcdn.com/24x18/${isoCode}.png`;
                        flagEl.style.display = "block";
                    } else {
                        flagEl.style.display = "none";
                    }
                } else {
                    natContainerEl.style.display = "none";
                }
                
                if (playerData.earnings && playerData.earnings !== "null") {
                    earnEl.style.display = "inline-flex";
                    earnEl.textContent = `${playerData.earnings} EARNED`;
                } else {
                    earnEl.style.display = "none"; 
                }
            } else {
                roleEl.textContent = "Competitor";
                natContainerEl.style.display = "none";
                earnEl.style.display = "none";
            }

            const logoEl = document.getElementById('sp-team-logo');
            logoEl.src = `images/teams/${formatTeamNameToPathSegment(teamName)}.png`;
            logoEl.style.display = 'block'; 
            logoEl.onerror = () => { logoEl.onerror = null; logoEl.src = 'images/LOGO.png'; };

            const hlContainer = document.getElementById('highlights-container');
            const spBodyContainer = document.getElementById('sp-body-container');
            hlContainer.innerHTML = ""; 
            
            if (playerData && playerData.highlights && playerData.highlights.length > 0) {
                let sortedHighlights =[...playerData.highlights];
                sortedHighlights.sort((a, b) => getTierScore(b.tier) - getTierScore(a.tier));
                const playerHighlights = sortedHighlights.slice(0, 3); 
                
                playerHighlights.forEach(hl => {
                    hlContainer.innerHTML += buildHighlightHTML(hl);
                });
                
                spBodyContainer.style.display = "flex";
            } else {
                spBodyContainer.style.display = "none";
            }

            const rankBox = document.getElementById('sp-rank');
            rankBox.classList.remove('active'); 
            
            if (embarkId !== "UNKNOWN") {
                const rankData = await fetchPlayerRank(embarkId);
                if (rankData) {
                    rankBox.textContent = `GLOBAL #${rankData}`; 
                    rankBox.classList.add('active'); 
                }
            }

            card.classList.add('active');
            currentPlayerDisplayed = playerName;
        }

        async function pollGoogleSheet() {
            try {
                // BYPASSING GOOGLE API BUGS - Fetch raw CSV
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${CONTROL_SHEET_GID}&range=A1:M5&nocache=${new Date().getTime()}`;
                const response = await fetch(url);
                const csvText = await response.text();
                const rows = parseCSV(csvText);

                if (rows.length < 3) return; // Wait until data is loaded

                // Index 1 = Row 2 (Name), Index 2 = Row 3 (Checkbox Switch)
                // Col 11 = Column L
                const rawName = (rows[1][11] || "").trim();
                const rawSwitch = (rows[2][11] || "").trim().toLowerCase();

                // Check if L3 is checked
                const isChecked = (rawSwitch === "true" || rawSwitch === "1" || rawSwitch === "yes");

                if (isChecked && rawName !== "") {
                    updateSpotlight(rawName); // Turn Spotlight ON
                } else {
                    updateSpotlight("");      // Turn Spotlight OFF
                }

            } catch (e) { console.error("Sheet Trigger Error:", e); }
        }

        pollGoogleSheet();
        setInterval(pollGoogleSheet, 3000); 

    </script>
</body>
</html>
