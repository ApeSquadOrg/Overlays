<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ape Squad - Trio Desk Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- GLOBAL THEME COLORS --- */
            --ape-cyan: #01a3eb; 
            --ape-orange: #ff853b; 
            --ape-pink: #f834ac; 
            --ape-purple: #904ce2; 
            --solid-bg: #0c0c0c; 
            
            --t1-grad: linear-gradient(135deg, var(--ape-cyan), var(--ape-orange)); 
            --t2-grad: linear-gradient(135deg, var(--ape-pink), var(--ape-purple)); 
            --host-grad: linear-gradient(135deg, var(--ape-purple), var(--ape-cyan)); 
            --ape-spectrum: linear-gradient(90deg, var(--ape-cyan), var(--ape-orange), var(--ape-pink), var(--ape-purple));
            --bg-gradient: linear-gradient(135deg, rgba(12,12,12,0.95), rgba(18,18,18,0.98));

            --font-main: 'Orbitron', sans-serif; 
            --font-header: 'Bebas Neue', sans-serif; 
            --font-sub: 'Roboto', sans-serif;

            /* --- MICRO-ADJUSTMENTS --- */
            --cam-width: 768px;          /* 3 Cams fit perfectly */
            --cam-height: 432px;         
            --cam-gap: 50px;             /* Space between the 3 cams */
            --cam-stage-y: 280px;        
            
            --ad-width: 640px;           
            --ad-height: 360px;          
            --ad-y-pos: 880px;           /* Pushed up slightly to fit */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-main); background: rgba(0,0,0,0); color: #fff; overflow: hidden; width: 2560px; height: 1440px; }
        .text-bounds { flex: 1; overflow: hidden; white-space: nowrap; min-width: 0; display: flex; align-items: center; }

        .top-logo-container { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); height: 120px; z-index: 100; }
        .top-logo-container img { height: 100%; width: auto; object-fit: contain; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.8)); }

        /* TRIO STAGE */
        .caster-stage { position: absolute; top: var(--cam-stage-y); left: 50%; transform: translateX(-50%); display: flex; gap: var(--cam-gap); z-index: 40; }
        .caster-wrapper { display: flex; flex-direction: column; width: var(--cam-width); filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)); }
        .cam-frame { width: var(--cam-width); height: var(--cam-height); background: transparent; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); position: relative; }

        /* Caster Card Base */
        .caster-card { display: flex; align-items: center; width: 100%; height: 70px; background: var(--solid-bg); position: relative; z-index: 2; }
        .caster-color-block { width: 70px; height: 100%; flex-shrink: 0; }
        .caster-info { flex-grow: 1; height: 100%; display: flex; align-items: center; gap: 15px; padding: 0 20px; overflow: hidden; }
        
        .caster-label { font-family: var(--font-sub); font-size: 1.1rem; color: #aaa; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; flex-shrink: 0; transform: translateY(2px); }
        .caster-name { font-family: var(--font-header); font-size: 3.2rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); transform: translateY(3px); }

        /* Theming for each of the 3 boxes */
        .left-caster .cam-frame { border: 4px solid var(--ape-cyan); border-image: var(--t1-grad) 1; }
        .left-caster .caster-card { border-bottom: 4px solid var(--ape-orange); }
        .left-caster .caster-color-block { background: var(--t1-grad); }
        .left-caster .caster-info { justify-content: flex-start; }

        .host-caster .cam-frame { border: 4px solid var(--ape-purple); border-image: var(--host-grad) 1; box-shadow: 0 0 20px rgba(144, 76, 226, 0.4), inset 0 0 20px rgba(0,0,0,0.8); }
        .host-caster .caster-card { border-bottom: 4px solid var(--ape-cyan); }
        .host-caster .caster-color-block { background: var(--host-grad); }
        .host-caster .caster-info { justify-content: center; } /* Host text stays centered */

        .right-caster .cam-frame { border: 4px solid var(--ape-pink); border-image: var(--t2-grad) 1; }
        .right-caster .caster-card { border-bottom: 4px solid var(--ape-purple); flex-direction: row-reverse; }
        .right-caster .caster-color-block { background: var(--t2-grad); }
        .right-caster .caster-info { justify-content: flex-end; flex-direction: row-reverse; }

        /* AD CAROUSEL */
        .ad-carousel-wrapper { position: absolute; top: var(--ad-y-pos); left: 50%; transform: translateX(-50%); z-index: 30; }
        .ad-container { width: var(--ad-width); height: var(--ad-height); background: #000; border: 2px solid rgba(255, 255, 255, 0.15); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border-radius: 4px; box-shadow: 0 15px 40px rgba(0,0,0,0.95), 0 0 20px rgba(1, 163, 235, 0.15); }
        .ad-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease-in-out; z-index: 1; }
        .ad-image.active { opacity: 1; z-index: 2; }

        /* FULL WIDTH BOTTOM BANNER */
        .hud-bottom { position: absolute; bottom: 0; left: 0; height: 80px; width: 100%; z-index: 50; filter: drop-shadow(0 -5px 15px rgba(0,0,0,0.7)); }
        .hud-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--solid-bg); z-index: 0; }
        .hud-bg::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--ape-spectrum); box-shadow: 0 0 10px var(--ape-cyan); }
        .center-logo-absolute { position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%); width: 300px; height: 130px; z-index: 20; display: flex; justify-content: center; align-items: flex-end; }
        .center-logo-absolute img { height: 100%; width: auto; object-fit: contain; filter: drop-shadow(0 0 20px rgba(255,255,255,0.15)); }

        .module-left { position: absolute; left: 60px; bottom: 0; height: 100%; display: flex; align-items: center; z-index: 15; width: 900px; overflow: hidden; white-space: nowrap; gap: 15px; }
        .module-left .module-label { color: var(--ape-cyan); }
        .module-right { position: absolute; right: 60px; bottom: 0; height: 100%; display: flex; align-items: center; z-index: 15; width: 500px; justify-content: flex-end; overflow: hidden; white-space: nowrap; gap: 15px; }
        .module-right .module-label { color: var(--ape-pink); }
        .module-label { font-family: var(--font-sub); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; flex-shrink: 0; }
        .module-value { font-family: var(--font-header); font-size: 2.2rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); transform: translateY(2px); transition: opacity 0.6s ease-in-out; opacity: 1;}
        .fade-out { opacity: 0 !important; }

        /* ================================================================= */
        /*   COMMUNITY PRIZE POOL (LEFT SIDE)                                */
        /* ================================================================= */
        .prize-container {
            position: absolute; 
            left: 60px; 
            bottom: 200px; 
            width: 700px; 
            min-height: 160px; 
            background: var(--bg-gradient);
            border-left: 6px solid var(--ape-cyan); 
            border-radius: 8px; 
            box-shadow: 10px 15px 30px rgba(0,0,0,0.8), 0 0 20px rgba(1, 163, 235, 0.15);
            display: flex; flex-direction: row; align-items: center;
            padding: 20px 25px;
            gap: 25px;
            transform: translateX(-150%);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease-in-out;
            z-index: 100;
        }

        .prize-container.active { transform: translateX(0); opacity: 1; }

        .prize-info-side { flex: 1; display: flex; flex-direction: column; justify-content: center; border-right: 2px solid rgba(255,255,255,0.1); padding-right: 25px; height: 100%; }
        .prize-label { font-family: var(--font-sub); font-size: 1.1rem; color: var(--ape-cyan); text-transform: uppercase; letter-spacing: 4px; font-weight: 900; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        
        .cyan-dot { width: 10px; height: 10px; background-color: var(--ape-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--ape-cyan); animation: pulseCyan 1.5s infinite alternate; flex-shrink: 0; }
        @keyframes pulseCyan { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 15px var(--ape-cyan); } }

        .prize-amount { font-family: var(--font-header); font-size: 5rem; letter-spacing: 3px; text-transform: uppercase; line-height: 1; text-shadow: 4px 4px 8px rgba(0,0,0,0.8); color: #fff; }
        .prize-cta-side { flex: 0 0 280px; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .prize-subtext { font-family: var(--font-sub); font-size: 1rem; color: #bbb; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }
        .prize-cta-box { font-family: var(--font-sub); font-size: 1.1rem; color: #fff; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; }
        .fund-highlight { color: #fff; font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; background: rgba(1, 163, 235, 0.15); border: 1px solid rgba(1, 163, 235, 0.5); padding: 4px 12px; border-radius: 4px; font-family: var(--font-header); box-shadow: 0 0 15px rgba(1, 163, 235, 0.2); transform: translateY(-2px); }

        /* ================================================================= */
        /*   TWITCH POLL OVERLAY (RIGHT SIDE)                                */
        /* ================================================================= */
        .poll-container {
            position: absolute; right: 60px; bottom: 200px; width: 780px; min-height: 160px; 
            background: var(--bg-gradient); border-left: 6px solid var(--ape-pink); border-radius: 8px; 
            box-shadow: -10px 15px 30px rgba(0,0,0,0.8), 0 0 20px rgba(248, 52, 172, 0.15);
            display: flex; flex-direction: row; padding: 20px 25px; gap: 30px;
            transform: translateX(150%); opacity: 0; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease-in-out; z-index: 100;
        }

        .poll-container.active { transform: translateX(0); opacity: 1; }

        .poll-info-side { flex: 0 0 260px; display: flex; flex-direction: column; border-right: 2px solid rgba(255,255,255,0.1); padding-right: 25px; }
        .poll-label { font-family: var(--font-sub); font-size: 1.1rem; color: var(--ape-pink); text-transform: uppercase; letter-spacing: 4px; font-weight: 900; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        
        .live-dot { width: 10px; height: 10px; background-color: var(--ape-pink); border-radius: 50%; box-shadow: 0 0 10px var(--ape-pink); animation: pulse 1.5s infinite alternate; flex-shrink: 0; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 15px var(--ape-pink); } }

        .poll-question { font-family: var(--font-header); font-size: 2.2rem; letter-spacing: 2px; text-transform: uppercase; line-height: 1.1; text-shadow: 3px 3px 5px rgba(0,0,0,0.8); color: #fff; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .poll-meta-group { margin-top: auto; display: flex; flex-direction: column; gap: 4px; padding-top: 15px; }
        .pf-text { font-family: var(--font-sub); font-size: 0.85rem; color: #888; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .pf-highlight { color: #fff; }

        .poll-options-side { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
        .poll-option { display: flex; flex-direction: column; gap: 4px; }
        .po-details { display: flex; justify-content: space-between; align-items: flex-end; }
        .po-title { font-family: var(--font-main); font-size: 1.1rem; font-weight: 700; color: #ddd; text-transform: uppercase; letter-spacing: 1px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
        .po-percent { font-family: var(--font-header); font-size: 1.5rem; line-height: 0.8; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3); }

        .po-bar-bg { width: 100%; height: 12px; background: #111; border-radius: 3px; border: 1px solid #333; overflow: hidden; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .po-bar-fill { height: 100%; width: 0%; border-radius: 2px; position: relative; transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .po-bar-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%); }

        .color-cyan { background: var(--ape-cyan); box-shadow: 0 0 10px var(--ape-cyan); color: var(--ape-cyan); }
        .color-orange { background: var(--ape-orange); box-shadow: 0 0 10px var(--ape-orange); color: var(--ape-orange); }
        .color-purple { background: var(--ape-purple); box-shadow: 0 0 10px var(--ape-purple); color: var(--ape-purple); }
        .color-pink { background: var(--ape-pink); box-shadow: 0 0 10px var(--ape-pink); color: var(--ape-pink); }

    </style>
</head>
<body>

    <div class="top-logo-container"><img src="images/classics.png" onerror="this.style.display='none'"></div>

    <div class="caster-stage">
        <!-- LEFT CASTER -->
        <div class="caster-wrapper left-caster">
            <div class="cam-frame"></div> 
            <div class="caster-card">
                <div class="caster-color-block"></div>
                <div class="caster-info">
                    <span class="caster-label">CASTER //</span>
                    <div class="text-bounds"><span class="caster-name" id="caster-left-name">LOADING</span></div>
                </div>
            </div>
        </div>
        
        <!-- HOST (CENTER) -->
        <div class="caster-wrapper host-caster">
            <div class="cam-frame"></div> 
            <div class="caster-card">
                <div class="caster-color-block"></div>
                <div class="caster-info">
                    <span class="caster-label">HOST //</span>
                    <div class="text-bounds"><span class="caster-name" id="host-name">LOADING</span></div>
                </div>
            </div>
        </div>

        <!-- RIGHT CASTER -->
        <div class="caster-wrapper right-caster">
            <div class="cam-frame"></div> 
            <div class="caster-card">
                <div class="caster-color-block"></div>
                <div class="caster-info">
                    <span class="caster-label">// CASTER</span>
                    <div class="text-bounds" style="justify-content: flex-end;"><span class="caster-name" id="caster-right-name">LOADING</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ad-carousel-wrapper">
        <div class="ad-container" id="ad-carousel">
            <img src="images/ostout.png" class="ad-image active" onerror="this.style.display='none'">
            <img src="images/shop.png" class="ad-image" onerror="this.style.display='none'">
            <img src="images/bundle.png" class="ad-image" onerror="this.style.display='none'">
        </div>
    </div>

    <!-- COMMUNITY PRIZE POOL (LEFT HORIZONTAL) -->
    <div class="prize-container" id="prize-card">
        <div class="prize-info-side">
            <div class="prize-label">
                <div class="cyan-dot"></div> TOURNAMENT PRIZE POOL
            </div>
            <div class="prize-amount" id="prize-amount">$0</div>
        </div>
        <div class="prize-cta-side">
            <div class="prize-subtext">SUPPORT THE EVENT //</div>
            <div class="prize-cta-box">
                TYPE <span class="fund-highlight">!SUPPORT</span> IN CHAT
            </div>
        </div>
    </div>

    <!-- HORIZONTAL TWITCH POLL OVERLAY (RIGHT) -->
    <div class="poll-container" id="poll-card">
        <div class="poll-info-side">
            <div class="poll-label" id="top-label">
                <div class="live-dot"></div> LIVE POLL
            </div>
            <div class="poll-question" id="poll-question">LOADING QUESTION...</div>
            <div class="poll-meta-group">
                <div class="pf-text" id="poll-timer" style="color: var(--ape-orange);">VOTING OPEN</div>
                <div class="pf-text">TOTAL VOTES: <span class="pf-highlight" id="poll-total-votes">0</span></div>
            </div>
        </div>
        <div class="poll-options-side" id="poll-options-container"></div>
    </div>

    <div class="hud-bottom">
        <div class="hud-bg"></div>
        <div class="module-left">
            <span class="module-label">UPDATE //</span>
            <div class="text-bounds"><span class="module-value" id="hud-cycling-info">APESQUAD.ORG</span></div>
        </div>
        <div class="center-logo-absolute"><img src="images/LOGO.png" onerror="this.style.display='none'"></div>
        <div class="module-right">
            <span class="module-label">SOCIALS //</span>
            <div class="text-bounds" style="justify-content: flex-end;"><span class="module-value">@APESQUADORG</span></div>
        </div>
    </div>

    <script>
        // =======================================================
        // GOOGLE SHEETS CONFIG 
        // =======================================================
        const SPREADSHEET_ID = '10ZmWteGljWdAu4TIMMkKkt23jFSuuKlTtqc-bxpVvN4';
        const SHEET_GID = '228881380';
        const AD_ROTATION_SPEED = 15000; 

        // =======================================================
        // TWITCH API INFO
        // =======================================================
        const TWITCH_BROADCASTER_ID = '1244098727'; 
        const TWITCH_ACCESS_TOKEN = 'pq73x2f88ep7grjs71mkryzmjbpg4w';
        const TWITCH_CLIENT_ID = '5re92foil9h4l73vwnz95f0hvq04ac';
        
        // --- BULLETPROOF CSV PARSER ---
        // (Brought over from Duos so the Checkbox for Prize Pool works flawlessly)
        function parseCSV(text) {
            let rows = []; let row = []; let inQuotes = false; let val = '';
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let next = text[i+1];
                if (c === '"' && inQuotes && next === '"') { val += '"'; i++; } 
                else if (c === '"') { inQuotes = !inQuotes; } 
                else if (c === ',' && !inQuotes) { row.push(val.trim()); val = ''; } 
                else if ((c === '\n' || c === '\r') && !inQuotes) {
                    if (c === '\r' && next === '\n') i++; 
                    row.push(val.trim()); rows.push(row); row = []; val = '';
                } else { val += c; }
            }
            if (val !== '' || row.length > 0) { row.push(val.trim()); rows.push(row); }
            return rows;
        }

        function getCSVVal(rows, rowIndex, colIndex) {
            if (rows && rows[rowIndex] && rows[rowIndex][colIndex] !== undefined) {
                return rows[rowIndex][colIndex].trim();
            }
            return '';
        }

        let bannerTexts = [];
        let currentBannerIndex = 0;
        let isBannerCycling = false;

        let currentAdIndex = 0;
        const ads = document.querySelectorAll('.ad-image');
        
        function rotateAds() {
            if(ads.length <= 1) return; 
            ads[currentAdIndex].classList.remove('active');
            currentAdIndex = (currentAdIndex + 1) % ads.length;
            ads[currentAdIndex].classList.add('active');
        }
        setInterval(rotateAds, AD_ROTATION_SPEED);

        function fitText(el, container, baseSize) {
            let size = baseSize; el.style.fontSize = `${size}rem`;
            while (el.scrollWidth > container.clientWidth && size > 0.8) { 
                size -= 0.1; el.style.fontSize = `${size}rem`; 
            }
        }

        function startBannerCycle() {
            if (isBannerCycling || bannerTexts.length <= 1) return;
            isBannerCycling = true;
            setInterval(() => {
                const textEl = document.getElementById('hud-cycling-info');
                textEl.classList.add('fade-out');
                setTimeout(() => {
                    currentBannerIndex = (currentBannerIndex + 1) % bannerTexts.length;
                    textEl.textContent = bannerTexts[currentBannerIndex];
                    fitText(textEl, textEl.parentElement, 2.4); 
                    textEl.classList.remove('fade-out');
                }, 600);
            }, 10000); 
        }

        async function updateData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${SHEET_GID}&nocache=${new Date().getTime()}`;
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = parseCSV(csvData);

                if (rows.length < 5) return; 

                // --- CASTER LOGIC (Left, Right, Host) ---
                const casterLeft = getCSVVal(rows, 4, 7) || getCSVVal(rows, 2, 7) || getCSVVal(rows, 1, 7) || "CASTER 1";
                const casterRight = getCSVVal(rows, 4, 8) || getCSVVal(rows, 2, 8) || getCSVVal(rows, 1, 8) || "CASTER 2";
                const hostName = getCSVVal(rows, 4, 9) || getCSVVal(rows, 2, 9) || getCSVVal(rows, 1, 9) || "HOST";

                const leftNameEl = document.getElementById('caster-left-name');
                const rightNameEl = document.getElementById('caster-right-name');
                const hostNameEl = document.getElementById('host-name');
                
                leftNameEl.textContent = casterLeft;
                rightNameEl.textContent = casterRight;
                hostNameEl.textContent = hostName;
                
                fitText(leftNameEl, leftNameEl.parentElement, 3.2);
                fitText(rightNameEl, rightNameEl.parentElement, 3.2);
                fitText(hostNameEl, hostNameEl.parentElement, 3.2);

                // --- BANNER LOGIC ---
                const newBannerTexts = [];
                for(let i = 1; i < rows.length; i++) {
                    const cellText = getCSVVal(rows, i, 5);
                    if (cellText && cellText !== '') newBannerTexts.push(cellText);
                }
                
                if (bannerTexts.length === 0 && newBannerTexts.length > 0) {
                    bannerTexts = newBannerTexts;
                    document.getElementById('hud-cycling-info').textContent = bannerTexts[0];
                    startBannerCycle();
                } else { 
                    bannerTexts = newBannerTexts; 
                }

                // --- PRIZE POOL LOGIC ---
                let prizeRowIndex = -1;
                for(let i = 0; i < rows.length; i++) {
                    if (getCSVVal(rows, i, 0).toLowerCase().includes('prize pool')) {
                        prizeRowIndex = i;
                        break;
                    }
                }

                if (prizeRowIndex !== -1 && rows.length > prizeRowIndex + 2) {
                    const rawAmount = getCSVVal(rows, prizeRowIndex + 1, 0);
                    const rawCheckbox = getCSVVal(rows, prizeRowIndex + 2, 0).toLowerCase();
                    const isChecked = (rawCheckbox === "true" || rawCheckbox === "1" || rawCheckbox === "yes");

                    if (isChecked) {
                        let cleanAmt = rawAmount.replace(/[^0-9.]/g, '');
                        if (cleanAmt) cleanAmt = Number(cleanAmt).toLocaleString('en-US');
                        else cleanAmt = "0";

                        document.getElementById('prize-amount').textContent = '$' + cleanAmt;
                        document.getElementById('prize-card').classList.add('active');
                    } else {
                        document.getElementById('prize-card').classList.remove('active');
                    }
                }

            } catch (error) { console.error("Data Fetch Error:", error); }
        }

        updateData(); setInterval(updateData, 5000);


        // --- TWITCH POLL LOGIC ---
        const themeColors = ['color-cyan', 'color-orange', 'color-purple', 'color-pink'];
        let hiddenPollIds = new Set(); 
        let seenActivePolls = new Set(); 

        function renderPoll(pollData) {
            document.getElementById('poll-question').textContent = pollData.question;
            document.getElementById('poll-total-votes').textContent = pollData.totalVotes.toLocaleString();
            
            const container = document.getElementById('poll-options-container');
            container.innerHTML = ''; 

            pollData.options.forEach((opt, index) => {
                let percent = pollData.totalVotes > 0 ? Math.round((opt.votes / pollData.totalVotes) * 100) : 0;
                let colorClass = themeColors[index % themeColors.length];

                const optionHTML = `
                    <div class="poll-option">
                        <div class="po-details">
                            <span class="po-title">${opt.title}</span>
                            <span class="po-percent" style="color: var(--ape-${colorClass.split('-')[1]});">${percent}%</span>
                        </div>
                        <div class="po-bar-bg">
                            <div class="po-bar-fill ${colorClass}" style="width: ${percent}%;"></div>
                        </div>
                    </div>
                `;
                container.innerHTML += optionHTML;
            });
        }

        async function fetchLiveTwitchPoll() {
            const url = `https://api.twitch.tv/helix/polls?broadcaster_id=${TWITCH_BROADCASTER_ID}`;
            
            try {
                const response = await fetch(url, {
                    headers: {
                        'Client-ID': TWITCH_CLIENT_ID,
                        'Authorization': `Bearer ${TWITCH_ACCESS_TOKEN}`
                    }
                });

                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    const activePoll = data.data[0];
                    
                    if (hiddenPollIds.has(activePoll.id)) return;

                    let formattedData = {
                        question: activePoll.title,
                        totalVotes: 0,
                        options: []
                    };

                    activePoll.choices.forEach(choice => {
                        let votes = choice.votes + choice.channel_points_votes; 
                        formattedData.options.push({ title: choice.title, votes: votes });
                        formattedData.totalVotes += votes;
                    });

                    if (activePoll.status === 'ACTIVE') {
                        seenActivePolls.add(activePoll.id);

                        renderPoll(formattedData);
                        document.getElementById('poll-card').classList.add('active');
                        document.getElementById('top-label').innerHTML = `<div class="live-dot"></div> LIVE POLL`;
                        document.getElementById('poll-timer').style.color = "var(--ape-orange)";
                        document.getElementById('poll-timer').textContent = "VOTING OPEN";
                    } else {
                        if (seenActivePolls.has(activePoll.id)) {
                            renderPoll(formattedData);
                            document.getElementById('poll-card').classList.add('active');
                            document.getElementById('top-label').innerHTML = "POLL RESULTS";
                            document.getElementById('poll-timer').style.color = "var(--ape-pink)";
                            document.getElementById('poll-timer').textContent = "CLOSED";
                            
                            if (!hiddenPollIds.has(activePoll.id + "_hiding")) {
                                hiddenPollIds.add(activePoll.id + "_hiding"); 
                                setTimeout(() => {
                                    document.getElementById('poll-card').classList.remove('active');
                                    hiddenPollIds.add(activePoll.id); 
                                }, 10000); 
                            }
                        } else {
                            document.getElementById('poll-card').classList.remove('active');
                            hiddenPollIds.add(activePoll.id); 
                        }
                    }
                } else {
                    document.getElementById('poll-card').classList.remove('active');
                }
            } catch (error) {}
        }

        setInterval(fetchLiveTwitchPoll, 3000);

    </script>
</body>
</html>
