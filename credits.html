<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ape Squad - Stream Credits</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ape-cyan: #01a3eb; 
            --ape-orange: #ff853b; 
            --ape-pink: #f834ac; 
            --ape-purple: #904ce2; 
            --font-main: 'Orbitron', sans-serif; 
            --font-header: 'Bebas Neue', sans-serif; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            width: 2560px; height: 1440px; 
            overflow: hidden; 
            background: #000;
            color: #fff;
            font-family: var(--font-main);
        }

        /* --- BACKGROUND VIDEO --- */
        #bg-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.35; 
        }

        /* --- BACKGROUND PORTRAITS & STICKERS --- */
        #bg-portraits, #bg-stickers {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .bg-portrait-img {
            position: absolute;
            top: 50%; 
            transform: translateY(-50%);
            height: 95vh; 
            width: auto;
            object-fit: contain;
            opacity: 0;
            transition: opacity 4s ease-in-out; 
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.9)); 
        }

        .pos-left { left: -4%; }
        .pos-right { right: -4%; }

        /* Bobbing Background Stickers */
        .floating-sticker {
            position: absolute;
            width: 180px; /* Slightly larger so they are visible from the background */
            height: auto;
            opacity: 0;
            transition: opacity 4s ease-in-out;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.9));
            animation: bob 4s ease-in-out infinite;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
            50% { transform: translateY(-30px) rotate(var(--rot, 0deg)); }
        }

        /* Overlay gradient */
        .vignette-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 75%, rgba(0,0,0,0.6) 100%),
                        radial-gradient(circle, rgba(0,0,0,0.1) 10%, rgba(0,0,0,0.85) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* --- SCROLLING WRAPPER --- */
        #credits-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spacer-start { height: 100vh; } 
        
        /* LOGOS */
        .credit-logo {
            width: 500px; height: auto;
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 30px rgba(1, 163, 235, 0.4));
        }

        .classics-logo {
            width: 600px; height: auto;
            margin-bottom: 150px;
            filter: drop-shadow(0 0 20px rgba(255, 133, 59, 0.3));
        }

        /* --- TYPOGRAPHY FOR ROLES & NAMES --- */
        .credit-block {
            text-align: center;
            margin-bottom: 110px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%;
            position: relative; 
        }

        .c-role {
            font-family: var(--font-main); 
            font-size: 3.8rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.9);
            margin-bottom: 15px; 
        }

        /* Single Column Names */
        .names-single {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px; 
        }

        /* Double Column Names (For Teams) */
        .names-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 120px; 
            row-gap: 2px;      
            justify-content: center;
            text-align: center;
            width: 80%;
            max-width: 1400px;
        }

        .c-name {
            font-family: var(--font-header); 
            font-size: 3.2rem; 
            color: var(--ape-cyan);
            letter-spacing: 2px;
            line-height: 0.9;
            text-shadow: 0 0 15px rgba(1, 163, 235, 0.6);
        }

        /* --- FINALE SCREEN --- */
        .finale-container {
            height: 100vh; 
            width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .finale-portrait {
            height: 600px; width: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9)) drop-shadow(0 0 30px rgba(255, 133, 59, 0.3)); 
        }

        .thank-you-text {
            font-family: var(--font-header);
            font-size: 8rem;
            color: #fff;
            margin-top: 50px;
            letter-spacing: 5px;
            text-shadow: 0 15px 30px rgba(0,0,0,0.9), 0 0 20px rgba(1, 163, 235, 0.4);
        }

        .url-text {
            font-family: var(--font-main);
            font-size: 2.5rem;
            color: var(--ape-cyan);
            letter-spacing: 12px;
            font-weight: 900;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND MUSIC -->
    <audio id="bg-music" autoplay loop>
        <source src="images/credits/credits.wav" type="audio/wav">
    </audio>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop id="bg-video">
        <source src="images/background.mp4" type="video/mp4">
    </video>
    
    <!-- BACKGROUND PORTRAITS CONTAINER -->
    <div id="bg-portraits">
        <img src="images/credits/merch.png" class="bg-portrait-img pos-left">
        <img src="images/credits/water.png" class="bg-portrait-img pos-right">
        <img src="images/credits/moon.png" class="bg-portrait-img pos-left">
	<img src="images/credits/dread.png" class="bg-portrait-img pos-left">
    </div>

    <!-- BACKGROUND STICKERS CONTAINER -->
    <div id="bg-stickers"></div>

    <div class="vignette-overlay"></div>

    <!-- CREDITS CONTAINER -->
    <div id="credits-wrapper"></div>

    <script>
        const SPREADSHEET_ID = '10ZmWteGljWdAu4TIMMkKkt23jFSuuKlTtqc-bxpVvN4';
        const SHEET_GID = '104113298';
        
        // =======================================================
        // CREDITS SETTINGS
        // =======================================================
        const PIXELS_PER_SECOND = 100; 
        const GRID_THRESHOLD = 10; 
        const TOTAL_STICKERS = 40; 
        // =======================================================

        function parseCSV(text) {
            let rows = []; let row = []; let inQuotes = false; let val = '';
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let next = text[i+1];
                if (c === '"' && inQuotes && next === '"') { val += '"'; i++; } 
                else if (c === '"') { inQuotes = !inQuotes; } 
                else if (c === ',' && !inQuotes) { row.push(val.trim()); val = ''; } 
                else if ((c === '\n' || c === '\r') && !inQuotes) {
                    if (c === '\r' && next === '\n') i++; 
                    row.push(val.trim()); rows.push(row); row = []; val = '';
                } else { val += c; }
            }
            if (val !== '' || row.length > 0) { row.push(val.trim()); rows.push(row); }
            return rows;
        }

        function playBackgroundSequence(totalDurationSeconds) {
            const bgImages = document.querySelectorAll('.bg-portrait-img');
            const stickersContainer = document.getElementById('bg-stickers');
            if (bgImages.length === 0) return;

            const activeTimeMs = (totalDurationSeconds * 1000) - 6000; 
            const timePerImageMs = activeTimeMs / bgImages.length;

            // Generate randomized sticker array
            let stickersArray = Array.from({length: TOTAL_STICKERS}, (_, i) => i + 1);
            for (let i = stickersArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [stickersArray[i], stickersArray[j]] = [stickersArray[j], stickersArray[i]];
            }
            let stickerIndex = 0;

            bgImages.forEach((img, index) => {
                const startTime = index * timePerImageMs;
                const endTime = startTime + timePerImageMs; 

                // 1. Portrait Fades
                setTimeout(() => { img.style.opacity = '0.5'; }, startTime);
                setTimeout(() => { img.style.opacity = '0'; }, endTime);

                // 2. Generate Stickers Opposite to the Portrait
                const isLeft = img.classList.contains('pos-left');
                const oppSide = isLeft ? 'right' : 'left';
                
                // Decide to spawn 2 or 3 stickers for this image
                const numStickers = Math.floor(Math.random() * 2) + 2; 

                for (let s = 0; s < numStickers; s++) {
                    if (stickerIndex >= stickersArray.length) break;

                    let stickerImg = document.createElement('img');
                    stickerImg.src = `images/credits/sticker/monkeysticker (${stickersArray[stickerIndex]}).png`;
                    stickerImg.className = 'floating-sticker';
                    stickerImg.onerror = function() { this.style.display='none'; };

                    // Calculate positioning to spread them out vertically
                    let topPos = 20 + (s * (55 / numStickers)) + (Math.random() * 10 - 5); 
                    let sidePos = 5 + Math.random() * 10; // 5% to 15% distance from edge
                    let rot = Math.floor(Math.random() * 40) - 20; // Tilt between -20 and 20 degrees
                    let delay = -(Math.random() * 4); // Negative delay starts the animation asynchronously right away

                    stickerImg.style.top = `${topPos}%`;
                    stickerImg.style[oppSide] = `${sidePos}%`;
                    stickerImg.style.setProperty('--rot', `${rot}deg`);
                    stickerImg.style.animationDelay = `${delay}s`;

                    stickersContainer.appendChild(stickerImg);

                    // Fade the stickers in and out synced with the background portrait
                    setTimeout(() => { stickerImg.style.opacity = '0.7'; }, startTime);
                    setTimeout(() => { stickerImg.style.opacity = '0'; }, endTime);

                    stickerIndex++;
                }
            });
        }

        function triggerScrollAnimation() {
            const wrapper = document.getElementById('credits-wrapper');
            const distanceToScroll = wrapper.scrollHeight - window.innerHeight;
            const durationSeconds = distanceToScroll / PIXELS_PER_SECOND;

            wrapper.style.transition = `transform ${durationSeconds}s linear`;
            playBackgroundSequence(durationSeconds);

            requestAnimationFrame(() => {
                wrapper.style.transform = `translateY(-${distanceToScroll}px)`;
            });
        }

        async function fetchAndBuildCredits() {
            try {
                const bgMusic = document.getElementById('bg-music');
                bgMusic.volume = 0.8; 
                bgMusic.play().catch(e => console.log("Audio autoplay waiting for interaction or OBS config."));

                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${SHEET_GID}&nocache=${new Date().getTime()}`;
                const response = await fetch(url);
                const csvData = await response.text();
                const rows = parseCSV(csvData);

                let dataRows = rows.slice(1);
                let blocks = [];
                let currentBlock = null;

                for (let i = 0; i < dataRows.length; i++) {
                    let role = dataRows[i][0] ? dataRows[i][0].trim() : '';
                    let name = dataRows[i][1] ? dataRows[i][1].trim() : '';

                    if (role === '' && name === '') continue; 

                    if (role !== '') {
                        currentBlock = { role: role, names: [] };
                        if (name !== '') currentBlock.names.push(name);
                        blocks.push(currentBlock);
                    } else {
                        if (name !== '') {
                            if (!currentBlock) {
                                currentBlock = { role: '', names: [] };
                                blocks.push(currentBlock);
                            }
                            currentBlock.names.push(name);
                        }
                    }
                }

                // --- BUILD HTML ---
                let html = '<div class="spacer-start"></div>';
                html += '<img src="images/LOGO.png" class="credit-logo" onerror="this.style.display=\'none\'">';
                html += '<img src="images/classics.png" class="classics-logo" onerror="this.style.display=\'none\'">';

                blocks.forEach((block, bIndex) => {
                    let containerClass = block.names.length > GRID_THRESHOLD ? 'names-grid' : 'names-single';
                    let namesHtml = block.names.map(n => `<div class="c-name">${n}</div>`).join('');

                    html += `
                        <div class="credit-block">
                            ${block.role ? `<div class="c-role">${block.role}</div>` : ''}
                            <div class="${containerClass}">
                                ${namesHtml}
                            </div>
                        </div>
                    `;
                });

                html += `
                    <div class="finale-container">
                        <img src="images/credits/sonjustin.png" class="finale-portrait" onerror="this.style.display='none'">
                        <div class="thank-you-text">THANK YOU FOR WATCHING</div>
                        <div class="url-text">APESQUAD.ORG</div>
                    </div>
                `;

                document.getElementById('credits-wrapper').innerHTML = html;
                setTimeout(triggerScrollAnimation, 2000);

            } catch (error) {
                console.error("Failed to load credits:", error);
            }
        }

        fetchAndBuildCredits();
        
    </script>
</body>
</html>
