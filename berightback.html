<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ape Squad - Pro BRB Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Ape Squad Palette */
            --ape-cyan: #01a3eb;
            --ape-orange: #ff853b;
            --ape-pink: #f834ac;
            --ape-purple: #904ce2;
            --ape-spectrum: linear-gradient(90deg, var(--ape-cyan), var(--ape-orange), var(--ape-pink), var(--ape-purple));
            
            --solid-bg: #0f0f0f;
            --box-bg: rgba(15, 15, 15, 0.85);
            
            /* Typography */
            --font-main: 'Orbitron', sans-serif; 
            --font-header: 'Bebas Neue', sans-serif;
            --font-sub: 'Roboto', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: var(--font-main); 
            background-color: transparent; 
            color: #fff; 
            width: 2560px; height: 1440px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- BACKGROUND FX --- */
        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 2px, transparent 2px);
            background-size: 50px 50px; z-index: -5;
            animation: bgDrift 40s linear infinite;
        }
        @keyframes bgDrift { 100% { background-position: -500px 500px; } }
        
        /* Floating Space Layer */
        #space-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -4; 
            pointer-events: none;
            overflow: hidden;
        }

        .space-debris {
            position: absolute;
            will-change: transform; 
        }

        .bg-vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 10%, #000 100%);
            z-index: -3; pointer-events: none;
        }
        
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px; z-index: -2; pointer-events: none; opacity: 0.8;
        }

        /* --- HEADER & TIMER --- */
        .header-container {
            position: absolute;
            top: 60px;
            text-align: center;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9));
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-logo {
            height: 100px; 
            width: auto;
            object-fit: contain;
            margin-bottom: -10px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }
        .header-main {
            font-family: var(--font-header); font-size: 10rem; line-height: 1; letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
            margin: 0;
            animation: slowPulse 4s infinite, randomGlitch 6s infinite;
        }
        .header-main .highlight {
            background: var(--ape-spectrum); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(144, 76, 226, 0.6));
        }
        
        @keyframes randomGlitch {
            0%, 96%, 100% { transform: translate(0, 0) skewX(0); filter: none; }
            97% { transform: translate(-5px, 2px) skewX(10deg); filter: blur(2px) contrast(150%); color: var(--ape-cyan); }
            98% { transform: translate(5px, -2px) skewX(-10deg); filter: blur(1px) contrast(120%); color: var(--ape-pink); }
            99% { transform: translate(0, 0) skewX(0); filter: none; color: #fff; }
        }

        .countdown-container {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--ape-cyan);
            border-radius: 50px;
            padding: 5px 30px;
            box-shadow: 0 0 20px rgba(1, 163, 235, 0.3), inset 0 0 10px rgba(1, 163, 235, 0.2);
            display: flex; align-items: center; gap: 15px;
        }
        .timer-label { font-family: var(--font-sub); font-size: 1.2rem; color: #aaa; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; }
        .timer-clock { font-family: var(--font-header); font-size: 3.5rem; color: var(--ape-cyan); letter-spacing: 2px; line-height: 1; text-shadow: 0 0 15px var(--ape-cyan); }

        @keyframes slowPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.98); }
        }

        /* --- TOWER ADS (OBS BUG FIX - HARDCODED PIXELS) --- */
        .tower-ad {
            position: absolute;
            top: 220px; /* Hardcoded exact pixel position from top */
            height: 950px; /* Forced height so OBS calculates bounding box immediately */
            width: auto;
            border-radius: 12px;
            z-index: 15;
            /* REMOVED: transform: translateY(-50%) */
        }
        
        .tower-left {
            left: 80px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 25px rgba(1, 163, 235, 0.3);
            animation: floatLeft 6s ease-in-out infinite;
        }
        
        .tower-right {
            right: 80px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 25px rgba(248, 52, 172, 0.3);
            animation: floatRight 6s ease-in-out infinite;
        }

        @keyframes floatLeft {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes floatRight {
            0%, 100% { transform: translateY(-20px); }
            50% { transform: translateY(0px); }
        }

        /* --- TEAM SHOWCASE CAROUSEL --- */
        .team-showcase {
            position: relative;
            width: 800px;
            height: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            margin-top: 40px;
        }
        
        .particle {
            position: absolute;
            background: var(--ape-cyan);
            border-radius: 50%;
            opacity: 0.5;
            animation: floatUp linear infinite;
            z-index: 1;
            box-shadow: 0 0 10px var(--ape-cyan);
        }
        .p1 { width: 8px; height: 8px; left: 10%; bottom: -10%; animation-duration: 8s; animation-delay: 0s; }
        .p2 { width: 12px; height: 12px; left: 85%; bottom: -20%; animation-duration: 12s; animation-delay: 2s; background: var(--ape-pink); box-shadow: 0 0 10px var(--ape-pink); }
        .p3 { width: 6px; height: 6px; left: 25%; bottom: -15%; animation-duration: 6s; animation-delay: 4s; background: var(--ape-orange); box-shadow: 0 0 10px var(--ape-orange); }
        .p4 { width: 15px; height: 15px; left: 75%; bottom: -5%; animation-duration: 14s; animation-delay: 1s; }
        .p5 { width: 9px; height: 9px; left: 50%; bottom: -30%; animation-duration: 10s; animation-delay: 5s; background: var(--ape-purple); box-shadow: 0 0 10px var(--ape-purple); }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-800px) scale(0.5); opacity: 0; }
        }

        .showcase-glow {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--ape-cyan) 0%, transparent 60%);
            opacity: 0.15;
            z-index: 1;
            border-radius: 50%;
            animation: colorShift 15s infinite;
        }

        @keyframes colorShift {
            0%, 100% { background: radial-gradient(circle, var(--ape-cyan) 0%, transparent 60%); }
            33% { background: radial-gradient(circle, var(--ape-pink) 0%, transparent 60%); }
            66% { background: radial-gradient(circle, var(--ape-orange) 0%, transparent 60%); }
        }

        .logo-container {
            position: relative;
            width: 450px;
            height: 450px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .team-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            opacity: 0;
            transform: scale(0.9);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
        }
        
        .text-group {
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: translateY(20px); z-index: 2;
        }

        .team-name-display {
            margin-top: 20px; font-family: var(--font-header); font-size: 5.5rem; color: #fff;
            letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 10px 20px rgba(0,0,0,0.9); line-height: 1;
        }
        
        .team-stats-display {
            font-family: var(--font-sub); font-size: 1.8rem; color: var(--ape-orange); font-weight: 900;
            letter-spacing: 6px; text-shadow: 0 0 15px rgba(255, 133, 59, 0.6); margin-top: 5px;
            background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 4px; border: 1px solid rgba(255, 133, 59, 0.3);
        }

        /* --- THE FINALS GLITCH EFFECT --- */
        .active-glitch { animation: glitchFadeIn 0.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes glitchFadeIn {
            0% { opacity: 0; transform: scale(1.1) skewX(20deg); filter: blur(10px) contrast(200%); clip-path: polygon(0 0, 100% 0, 100% 10%, 0 10%); }
            20% { opacity: 0.8; transform: scale(0.95) skewX(-10deg); filter: blur(2px) contrast(150%); clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); }
            40% { opacity: 1; transform: scale(1.02) skewX(5deg); clip-path: polygon(0 40%, 100% 40%, 100% 80%, 0 80%); }
            60% { opacity: 1; transform: scale(0.99) skewX(0); clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
            80% { transform: translate(5px, -5px); }
            100% { opacity: 1; transform: scale(1) translate(0, 0); filter: blur(0) contrast(100%); clip-path: none; }
        }

        /* --- MUSIC PLAYER --- */
        .music-player {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            width: 1200px; height: 180px; background: rgba(10, 10, 10, 0.85);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; padding: 20px; z-index: 20; overflow: hidden;
        }
        .music-player::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--ape-spectrum); }

        .album-art {
            width: 140px; height: 140px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            object-fit: cover; margin-right: 30px; border: 2px solid rgba(255,255,255,0.1);
            animation: bassPulse 1.5s infinite alternate ease-in-out;
        }

        @keyframes bassPulse {
            0% { box-shadow: 0 0 15px rgba(248, 52, 172, 0.3); border-color: rgba(255,255,255,0.1); transform: scale(1); }
            100% { box-shadow: 0 0 30px rgba(248, 52, 172, 0.7); border-color: rgba(248, 52, 172, 0.5); transform: scale(1.02); }
        }

        .track-info { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; padding-right: 200px; }
        .now-playing-label { font-family: var(--font-sub); font-size: 1.2rem; color: var(--ape-cyan); letter-spacing: 6px; font-weight: 700; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .blinking-dot { width: 10px; height: 10px; background: var(--ape-pink); border-radius: 50%; box-shadow: 0 0 10px var(--ape-pink); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .track-name { font-family: var(--font-header); font-size: 3.5rem; color: #fff; letter-spacing: 2px; line-height: 1; text-shadow: 0 5px 10px rgba(0,0,0,0.5); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { font-family: var(--font-sub); font-size: 1.1rem; color: #aaa; letter-spacing: 2px; text-transform: uppercase; }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 15px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--ape-cyan); box-shadow: 0 0 10px var(--ape-cyan); transition: width 0.1s linear; }
        .time-display { position: absolute; right: 0; top: -22px; font-family: var(--font-main); font-size: 1rem; color: #888; letter-spacing: 1px; }

        .waveform { display: flex; align-items: flex-end; gap: 5px; height: 60px; position: absolute; right: 40px; bottom: 60px; }
        .bar { width: 8px; background: var(--ape-spectrum); border-radius: 4px 4px 0 0; animation: bounce 1s infinite alternate; }
        .bar:nth-child(1) { height: 20px; animation-duration: 0.4s; }
        .bar:nth-child(2) { height: 40px; animation-duration: 0.6s; }
        .bar:nth-child(3) { height: 60px; animation-duration: 0.5s; }
        .bar:nth-child(4) { height: 30px; animation-duration: 0.7s; }
        .bar:nth-child(5) { height: 50px; animation-duration: 0.45s; }
        .bar:nth-child(6) { height: 25px; animation-duration: 0.55s; }
        .bar:nth-child(7) { height: 45px; animation-duration: 0.65s; }
        .bar:nth-child(8) { height: 15px; animation-duration: 0.4s; }
        .bar:nth-child(9) { height: 55px; animation-duration: 0.75s; }
        .bar:nth-child(10){ height: 35px; animation-duration: 0.5s; }
        @keyframes bounce { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1); } }

    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    <!-- Layer for zero-gravity floating objects -->
    <div id="space-layer"></div>
    <div class="bg-vignette"></div>
    <div class="scanlines"></div>

    <!-- TOWER ADS -->
    <img src="images/bundletower.png" alt="Bundle Ad" class="tower-ad tower-left" onerror="this.style.display='none'">
    <img src="images/shoptower.png" alt="Shop Ad" class="tower-ad tower-right" onerror="this.style.display='none'">

    <!-- HEADER & COUNTDOWN TIMER -->
    <div class="header-container">
        <img src="images/classics.png" alt="Classics" class="header-logo" onerror="this.style.display='none'">
        <div class="header-main">BE RIGHT <span class="highlight">BACK</span></div>
        <div class="countdown-container">
            <span class="timer-label">MATCH RESUMES IN</span>
            <span class="timer-clock" id="timer-display">00:00</span>
        </div>
    </div>

    <!-- TEAM SHOWCASE WITH STATS -->
    <div class="team-showcase">
        <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div><div class="particle p4"></div><div class="particle p5"></div>
        <div class="showcase-glow"></div>
        
        <div class="logo-container" id="logo-container">
            <div id="loading-text" style="font-family: var(--font-header); font-size: 3rem; color: var(--ape-cyan);">LOADING TEAMS...</div>
        </div>
        
        <div class="text-group" id="text-group">
            <div class="team-name-display" id="team-name-display"></div>
            <div class="team-stats-display" id="team-stats-display">RANK #-- // -- PTS</div>
        </div>
    </div>

    <!-- AUDIO PLAYER WITH PROGRESS BAR -->
    <div class="music-player">
        <img src="images/ost.png" alt="OST Album Art" class="album-art" onerror="this.style.display='none'">
        <div class="track-info">
            <div class="now-playing-label"><div class="blinking-dot"></div> NOW PLAYING</div>
            <div class="track-name" id="track-name">LOADING AUDIO...</div>
            <div class="artist-name">Abandon Human // Prod. WHYSATANWHY</div>
            
            <div class="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="time-display" id="time-display">0:00 / 0:00</div>
            </div>
        </div>
        
        <div class="waveform" id="waveform">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const CONFIG = {
            SPREADSHEET_ID: '10ZmWteGljWdAu4TIMMkKkt23jFSuuKlTtqc-bxpVvN4', 
            SHEET_GID: '1919570457', // Leaderboard NA GID
            TEAM_ROTATION_SPEED: 5000, 
            BREAK_MINUTES: 5, 
            
            // 🚀 FLOATING SPACE OBJECTS 🚀
            FLOAT_SPAWN_RATE: 25000, // Try spawning every 5 seconds
            FLOAT_IMAGES: [
                'm11.png',
                'outfit.png',
                'c4.png',
                'healbeam.png'
            ],

            // 🎵 PLAYLIST 🎵
            PLAYLIST: [
                'final-destination.wav',
                'game-time.wav',
                'to-battle.wav',
                'blood-chunks.wav'
            ]
        };
        // ==========================================

        // --- HIGHLY OPTIMIZED ZERO-GRAVITY LOGIC ---
        const activeFloaters = new Set(); // Tracks what is currently on screen

        function spawnSpaceDebris() {
            if(!CONFIG.FLOAT_IMAGES || CONFIG.FLOAT_IMAGES.length === 0) return;
            
            // Filter images so duplicates don't spawn
            const availableImages = CONFIG.FLOAT_IMAGES.filter(img => !activeFloaters.has(img));
            if (availableImages.length === 0) return; // Wait until an image leaves the screen
            
            // Pick a random image from available pool
            const src = availableImages[Math.floor(Math.random() * availableImages.length)];
            activeFloaters.add(src); // Mark as active
            
            const layer = document.getElementById('space-layer');
            const img = document.createElement('img');
            
            img.src = `images/float/${src}`;
            img.className = 'space-debris';
            
            // Generate Depth (0.0 to 1.0)
            const depth = Math.random();
            const size = 150 + (depth * 300); // 150px to 450px
            img.style.width = `${size}px`;
            img.style.height = 'auto';
            img.style.opacity = 1; 

            // Decide start position (Left or Right off screen)
            const startsLeft = Math.random() > 0.5;
            const startX = startsLeft ? -400 : 2960;
            const endX = startsLeft ? 2960 : -400;
            
            // Y positions (vertical drift)
            const startY = Math.random() * 1440;
            const endY = startY + ((Math.random() * 800) - 400); 
            
            // Rotation (tumble)
            const startRot = Math.random() * 360;
            const endRot = startRot + ((Math.random() * 720) - 360); 
            
            // Duration: Further = Slower, Closer = Faster
            const duration = 40000 - (depth * 25000); 
            
            // Set initial pos
            img.style.left = '0px';
            img.style.top = '0px';
            img.style.transform = `translate(${startX}px, ${startY}px) rotate(${startRot}deg)`;
            
            layer.appendChild(img);
            
            // Animate using Web Animations API (Hardware Accelerated)
            const animation = img.animate([
                { transform: `translate(${startX}px, ${startY}px) rotate(${startRot}deg)` },
                { transform: `translate(${endX}px, ${endY}px) rotate(${endRot}deg)` }
            ], {
                duration: duration,
                easing: 'linear',
                fill: 'forwards'
            });
            
            animation.onfinish = () => {
                img.remove();
                activeFloaters.delete(src);
            };
        }

        setInterval(spawnSpaceDebris, CONFIG.FLOAT_SPAWN_RATE);
        setTimeout(spawnSpaceDebris, 500);

        // --- COUNTDOWN TIMER LOGIC ---
        let timeRemaining = CONFIG.BREAK_MINUTES * 60;
        const timerDisplay = document.getElementById('timer-display');

        function updateTimer() {
            if (timeRemaining <= 0) {
                timerDisplay.textContent = "00:00";
                timerDisplay.style.color = "var(--ape-pink)";
                timerDisplay.style.textShadow = "0 0 15px var(--ape-pink)";
                return;
            }
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
            timeRemaining--;
        }
        setInterval(updateTimer, 1000);
        updateTimer(); 

        // --- TEAM CAROUSEL WITH STATS ---
        const query = encodeURIComponent("SELECT M, N, O WHERE M IS NOT NULL");
        const API_URL = `https://docs.google.com/spreadsheets/d/${CONFIG.SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${CONFIG.SHEET_GID}&tq=${query}`;

        let teamData = [];
        let currentTeamIndex = 0;
        
        const logoContainer = document.getElementById('logo-container');
        const textGroup = document.getElementById('text-group');
        const nameDisplay = document.getElementById('team-name-display');
        const statsDisplay = document.getElementById('team-stats-display');

        function formatTeamNameToPathSegment(name) {
            if (!name || name.trim() === '') return 'default'; 
            return name.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        }

        async function fetchTeams() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                const rows = json.table.rows;

                let startIndex = 0;
                if(rows[0] && rows[0].c[0] && rows[0].c[0].v === 'Rank') startIndex = 1;

                for(let i = startIndex; i < rows.length; i++) {
                    const row = rows[i];
                    if(!row.c[1] || !row.c[1].v) continue;

                    const rank = row.c[0] ? row.c[0].v : '-';
                    const name = row.c[1].v.toString().trim();
                    const rawPts = row.c[2] ? row.c[2].v : 0;
                    const pts = Math.floor(Number(rawPts)); 

                    teamData.push({ rank, name, pts });
                }

                if (teamData.length > 0) {
                    teamData.sort(() => 0.5 - Math.random());
                    buildImageElements();
                    startTeamCarousel();
                } else {
                    logoContainer.innerHTML = `<div style="font-family: Bebas Neue; font-size: 3rem;">NO TEAMS FOUND</div>`;
                }
            } catch (error) {
                console.error("Error fetching teams:", error);
                logoContainer.innerHTML = `<div style="font-family: Bebas Neue; font-size: 3rem; color: var(--ape-pink);">DATABASE ERROR</div>`;
            }
        }

        function buildImageElements() {
            logoContainer.innerHTML = ''; 
            teamData.forEach((team, index) => {
                const fileName = formatTeamNameToPathSegment(team.name);
                const img = document.createElement('img');
                img.src = `images/teams/${fileName}.png`;
                img.className = 'team-image';
                img.id = `img-${index}`;
                img.onerror = function() { 
                    this.onerror = null; 
                    this.src = 'images/LOGO.png'; 
                };
                logoContainer.appendChild(img);
            });
        }

        function startTeamCarousel() {
            const images = document.querySelectorAll('.team-image');
            if (images.length === 0) return;

            function showNextTeam() {
                images[currentTeamIndex].classList.remove('active-glitch', 'active');
                textGroup.classList.remove('active-glitch', 'active');

                currentTeamIndex = (currentTeamIndex + 1) % images.length;
                const activeTeam = teamData[currentTeamIndex];

                setTimeout(() => {
                    nameDisplay.textContent = activeTeam.name;
                    statsDisplay.textContent = `RANK #${activeTeam.rank}  //  ${activeTeam.pts} PTS`;
                    images[currentTeamIndex].classList.add('active', 'active-glitch');
                    textGroup.classList.add('active', 'active-glitch');
                }, 50);
            }

            nameDisplay.textContent = teamData[0].name;
            statsDisplay.textContent = `RANK #${teamData[0].rank}  //  ${teamData[0].pts} PTS`;
            images[0].classList.add('active', 'active-glitch');
            textGroup.classList.add('active', 'active-glitch');

            setInterval(showNextTeam, CONFIG.TEAM_ROTATION_SPEED);
        }

        // --- MUSIC PLAYER & PROGRESS BAR LOGIC ---
        const audioPlayer = document.getElementById('audio-player');
        const trackNameDisplay = document.getElementById('track-name');
        const progressFill = document.getElementById('progress-fill');
        const timeDisplay = document.getElementById('time-display');
        let currentTrackIndex = 0;

        function formatTrackName(filename) {
            let name = filename.replace('.wav', '').replace('.mp3', '');
            name = name.replace(/_/g, ' ').replace(/-/g, ' ');
            return name.toUpperCase();
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function playNextTrack() {
            if (CONFIG.PLAYLIST.length === 0) return;

            const currentFile = CONFIG.PLAYLIST[currentTrackIndex];
            audioPlayer.src = `music/${currentFile}`;
            trackNameDisplay.textContent = formatTrackName(currentFile);
            
            audioPlayer.play().catch(error => console.log("Autoplay prevented.", error));
            currentTrackIndex = (currentTrackIndex + 1) % CONFIG.PLAYLIST.length;
        }

        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            if (duration) {
                const percent = (currentTime / duration) * 100;
                progressFill.style.width = `${percent}%`;
                timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
            }
        });

        audioPlayer.addEventListener('ended', playNextTrack);

        // --- INIT ---
        fetchTeams();
        playNextTrack();

    </script>
</body>
</html>
